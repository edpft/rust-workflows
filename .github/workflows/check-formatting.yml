name: Check formatting
on:
  workflow_call:
    inputs:
      toolchain:
        description: >-
          The Rust toolchain to install. This action does not read
          rust-toolchain.toml, so pass your pinned version here if you have one.
        type: string
        required: false
        default: stable
      runs-on:
        description: The runner to use.
        type: string
        required: false
        default: ubuntu-latest

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check-formatting:
    name: Check formatting
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ inputs.toolchain }}
          components: rustfmt

      # No cache: rustfmt compiles nothing, so there is nothing to reuse.
      - name: Check formatting
        run: cargo fmt --all --check
