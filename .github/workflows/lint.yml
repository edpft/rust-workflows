name: Lint
on:
  workflow_call:
    inputs:
      toolchain:
        description: >-
          The Rust toolchain to install. This action does not read
          rust-toolchain.toml, so pass your pinned version here if you have one.
        type: string
        required: false
        default: stable
      runs-on:
        description: The runner to use.
        type: string
        required: false
        default: ubuntu-latest

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ inputs.toolchain }}
          components: clippy

      - name: Setup cache
        uses: Swatinem/rust-cache@v2

      # `--all-targets` so tests and benches are linted too, not just the lib.
      - name: Run `clippy`
        run: cargo clippy --locked --all-targets -- -D warnings
