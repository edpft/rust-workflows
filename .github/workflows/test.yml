name: Test
on:
  workflow_call:
    inputs:
      toolchain:
        description: >-
          The Rust toolchain to install. This action does not read
          rust-toolchain.toml, so pass your pinned version here if you have one.
        type: string
        required: false
        default: stable
      runs-on:
        description: The runner to use.
        type: string
        required: false
        default: ubuntu-latest

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ inputs.toolchain }}

      - name: Setup cache
        uses: Swatinem/rust-cache@v2

      # Deliberately not `--all-targets`: that flag *excludes* doctests.
      - name: Run tests
        run: cargo test --locked
